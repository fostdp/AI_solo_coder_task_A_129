worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 日志格式（JSON 风格，便于接入 ELK/Loki）
    log_format bronze_main escape=json
        '{'
            '"time":"$time_local",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"referer":"$http_referer",'
            '"ua":"$http_user_agent",'
            '"request_time":$request_time,'
            '"upstream_time":$upstream_response_time'
        '}';

    access_log /var/log/nginx/access.log bronze_main;
    error_log  /var/log/nginx/error.log warn;

    # 基本优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 16m;

    # ============================================================
    # Gzip 压缩：显著降低 JS/CSS/JSON/HTML 等文本资源的体积
    # ============================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/x-font-ttf
        application/vnd.ms-fontobject
        font/opentype
        image/svg+xml
        image/x-icon
        application/wasm;

    # 上游：Rust 后端（Prometheus 转发和 API 转发）
    upstream bronze_backend {
        server backend:8080;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        root   /usr/share/nginx/html;
        index  index.html;

        # 静态资源强缓存（Three.js、CSS、图片等）
        location ~* \.(?:js|css|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot|wasm)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            add_header Access-Control-Allow-Origin *;
            try_files $uri =404;
        }

        # ============================================================
        # API 转发到 Rust 后端
        # ============================================================
        location /api/ {
            proxy_pass         http://bronze_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # 长轮询和 WebSocket 超时
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            client_body_timeout 3600s;
        }

        # ============================================================
        # Prometheus 指标端点转发
        # ============================================================
        location /metrics {
            proxy_pass         http://bronze_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # ============================================================
        # WebSocket 告警流：需要 Upgrade 头
        # ============================================================
        location /api/alarms/stream {
            proxy_pass         http://bronze_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # SPA 路由：所有未知路径回到 index.html
        location / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header X-Content-Type-Options nosniff;
            add_header X-Frame-Options DENY;
            add_header X-XSS-Protection "1; mode=block";
            add_header Referrer-Policy strict-origin;
            try_files $uri $uri/ /index.html;
        }
    }
}
