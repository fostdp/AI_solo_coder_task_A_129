# ============================================================
# Prometheus 采集配置：监控铜鼓系统全链路
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: bronze-drum
    environment: production

# 告警规则（可选）
# rule_files:
#   - /etc/prometheus/rules.yml

# 采集目标
scrape_configs:

  # ------------------------------
  # 1. Rust 后端（含应用指标 + process 指标）
  # ------------------------------
  - job_name: bronze-backend
    honor_timestamps: true
    static_configs:
      - targets: ['backend:8080']
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: (.*):\d+
        replacement: $1

  # ------------------------------
  # 2. ClickHouse（需要 clickhouse_exporter 或内置指标）
  # 此处用 system.asynchronous_metrics 风格的 exporter
  # ------------------------------
  - job_name: clickhouse
    static_configs:
      - targets: ['clickhouse:8123']
    metrics_path: /metrics
    scrape_interval: 30s

  # ------------------------------
  # 3. Nginx 前端（stub_status）
  # ------------------------------
  # 注意：nginx conf 需启用 /nginx_status 端点
  # 此处监控前端容器的基本连接数
  - job_name: nginx-frontend
    static_configs:
      - targets: ['frontend:80']
    metrics_path: /metrics
    scrape_interval: 15s

  # ------------------------------
  # 4. Mosquitto MQTT Broker（通过 exporter）
  # ------------------------------
  - job_name: mosquitto-mqtt
    static_configs:
      - targets: ['mqtt-exporter:9234']
    scrape_interval: 15s
    params:
      target: ['mqtt:1883']
