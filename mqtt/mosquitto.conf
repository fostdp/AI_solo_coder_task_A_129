# ============================================================
# Eclipse Mosquitto MQTT Broker 配置
# 用于铜鼓系统告警推送 + 传感器数据 MQTT 接入
# ============================================================

# 基本参数
pid_file /mosquitto/log/mosquitto.pid
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# 连接控制
max_connections -1
max_inflight_bytes 0
max_queued_messages 0
message_size_limit 0

# 保留消息支持（用于传感器最近状态）
retain_available true
allow_anonymous true

# 默认监听器（容器内非TLS，生产环境建议TLS）
listener 1883 0.0.0.0
protocol mqtt

# WebSocket 监听器（可选，用于前端直接连 MQTT）
listener 9001 0.0.0.0
protocol websockets

# ============================================================
# 持久化与 QoS
# ============================================================
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# ============================================================
# 桥接示例（可选，当需要转发到上级 MQTT 时）
# ============================================================
# connection bronze-cloud
# address broker.example.com:8883
# topic bronze-drum/# out 1
# bridge_cafile /mosquitto/config/certs/ca.crt
# bridge_certfile /mosquitto/config/certs/client.crt
# bridge_keyfile /mosquitto/config/certs/client.key
# bridge_insecure false

# ============================================================
# 安全加固（生产环境取消注释）
# ============================================================
# allow_anonymous false
# password_file /mosquitto/config/passwd
# acl_file /mosquitto/config/acl

# 访问控制列表示例
# pattern read $SYS/#
# pattern write bronze-drum/sensors/%u
# pattern read bronze-drum/alarms
